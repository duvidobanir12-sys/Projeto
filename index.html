<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0e;
    --surface: #131316;
    --card: #1b1b1f;
    --border: #2a2a30;
    --accent: #c8382a;
    --accent2: #e8a020;
    --green: #22c55e;
    --red: #ef4444;
    --text: #f2f2f4;
    --muted: #6b6b78;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.55rem;
    letter-spacing: 0.5px;
    color: var(--text);
  }

  .tabs {
    display: flex;
    gap: 0;
    padding: 0 16px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    padding: 14px 18px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    white-space: nowrap;
    transition: all .2s;
    margin-bottom: -1px;
    letter-spacing: 0.3px;
  }
  .tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  .main {
    background: var(--bg);
    margin: 0;
    padding: 20px 16px 32px;
    min-height: calc(100vh - 120px);
  }

  .page { display: none; }
  .page.active { display: block; }

  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.35rem;
    color: var(--text);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }

  .menu-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 12px;
    cursor: pointer;
    transition: all .18s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .menu-item:hover { border-color: var(--accent); background: #222228; }
  .menu-item.selected { border-color: var(--accent); background: rgba(200,56,42,0.07); }
  .menu-item .emoji { font-size: 1.9rem; display: block; margin-bottom: 6px; }
  .menu-item .item-name { font-weight: 600; font-size: 0.82rem; line-height: 1.3; }
  .menu-item .item-price { color: var(--accent2); font-weight: 700; font-size: 0.9rem; margin-top: 5px; }
  .menu-item .qty-badge {
    position: absolute; top: 6px; right: 6px;
    background: var(--accent); color: white;
    border-radius: 50%; width: 20px; height: 20px;
    font-size: 0.7rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  .pedido-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
  }

  .pedido-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
  }
  .pedido-row .row-name { flex: 1; font-weight: 600; }
  .pedido-row .qty-ctrl { display: flex; align-items: center; gap: 6px; }
  .qty-btn {
    background: var(--border); border: none; color: var(--text);
    width: 26px; height: 26px; border-radius: 6px;
    cursor: pointer; font-size: 1rem; font-weight: 700; transition: background .15s;
  }
  .qty-btn:hover { background: var(--accent); }
  .pedido-row .row-price { color: var(--accent2); font-weight: 800; min-width: 60px; text-align: right; }

  .total-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-top: 1px solid var(--border);
    font-family: 'DM Serif Display', serif; font-size: 1.25rem;
  }
  .total-bar .total-val { color: var(--accent2); }

  input, select, textarea {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 10px 12px;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; width: 100%; transition: border-color .2s;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  select option { background: var(--bg); }
  label { font-size: 0.75rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; display: block; letter-spacing: 0.5px; text-transform: uppercase; }

  .btn {
    padding: 11px 20px; border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.88rem;
    cursor: pointer; transition: all .18s;
    display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #b52e22; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group { margin-bottom: 12px; }

  .hist-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px;
  }
  .hist-card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 8px;
  }
  .hist-cliente-nome { font-weight: 700; font-size: 0.97rem; }
  .hist-total {
    font-family: 'DM Serif Display', serif; font-size: 1.15rem;
    color: var(--accent2); white-space: nowrap; margin-left: 10px;
  }
  .hist-itens { font-size: 0.82rem; color: var(--muted); margin-bottom: 6px; }
  .hist-meta {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 6px; margin-top: 6px;
  }
  .hist-end { font-size: 0.76rem; color: var(--muted); flex: 1; }
  .hist-data { font-size: 0.73rem; color: var(--muted); white-space: nowrap; }
  .hist-acoes {
    display: flex; gap: 6px; margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .hist-acoes .btn { flex: 1; padding: 8px 10px; font-size: 0.78rem; }

  .kpi-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px; margin-bottom: 24px;
  }
  .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .kpi-card .kpi-label { font-size: 0.7rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .kpi-card .kpi-val { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--accent2); margin: 4px 0 0; line-height: 1; }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty .empty-icon { font-size: 3rem; margin-bottom: 10px; }

  .toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--green); color: white; padding: 11px 22px;
    border-radius: 30px; font-weight: 600; font-size: 0.88rem;
    z-index: 999; transition: transform .3s; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); }

  @media (max-width: 480px) {
    .pedido-header { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .btn-row-3 { grid-template-columns: 1fr 1fr; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="logo"></div>
  <div style="font-size:0.72rem;color:var(--muted);font-weight:500;letter-spacing:1.5px;text-transform:uppercase;" id="header-date"></div>
</header>

<div class="tabs">
  <div class="tab active" onclick="goTab('pedidos', this)">🛒 Pedido</div>
  <div class="tab" onclick="goTab('historico', this)">📋 Histórico</div>
  <div class="tab" onclick="goTab('dashboard', this)">📊 Dashboard</div>
  <div class="tab" onclick="goTab('funcionarios', this)">👷 Funcionários</div>
  <div class="tab" onclick="goTab('gastos', this)">💸 Gastos</div>
  <div class="tab" onclick="goTab('cardapio', this)">🥩 Cardápio</div>
</div>

<div class="main">

  <!-- PEDIDOS -->
  <div class="page active" id="page-pedidos">
    <div class="section-title">🛒 Novo Pedido</div>
    <div class="pedido-box">
      <div class="form-row" style="margin-bottom:10px">
        <div class="form-group" style="margin:0">
          <label>Nome</label>
          <input type="text" id="ped-cliente" placeholder="Nome do cliente">
        </div>
        <div class="form-group" style="margin:0">
          <label>Telefone</label>
          <input type="tel" id="ped-fone" placeholder="(91) 98153-7201">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:10px">
        <label>Endereço</label>
        <input type="text" id="ped-end" placeholder="Rua, número, bairro...">
      </div>
      <div class="form-row">
        <div class="form-group" style="margin:0">
          <label>Taxa de entrega (R$)</label>
          <input type="number" id="ped-taxa" value="2" min="0" step="0.50">
        </div>
        <div class="form-group" style="margin:0">
          <label>Observação</label>
          <input type="text" id="ped-obs" placeholder="Ex: sem cebola...">
        </div>
      </div>
    </div>

    <div class="section-title" style="font-size:1.1rem;">🥩 Cardápio</div>
    <div class="cards-grid" id="cardapio-grid"></div>

    <div class="pedido-box" id="carrinho-box" style="display:none">
      <div class="section-title" style="font-size:1.1rem;margin-bottom:10px;">🧾 Carrinho</div>
      <div class="pedido-list" id="carrinho-list"></div>
      <div class="total-bar">
        <span>TOTAL</span>
        <span class="total-val" id="total-val">R$ 0,00</span>
      </div>
      <br>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="limparCarrinho()">❌ Limpar</button>
        <button class="btn btn-primary" onclick="confirmarPedido()">✅ Confirmar Pedido</button>
      </div>
    </div>
  </div>

  <!-- HISTÓRICO -->
  <div class="page" id="page-historico">
    <div class="section-title">📋 Histórico de Pedidos</div>
    <div id="hist-list"></div>
    <div class="empty" id="hist-empty" style="display:none">
      <div class="empty-icon">📭</div>
      Nenhum pedido ainda.
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="page" id="page-dashboard">
    <div class="section-title">📊 Dashboard</div>
    <div class="kpi-grid" id="kpi-grid"></div>
  </div>

  <!-- FUNCIONÁRIOS -->
  <div class="page" id="page-funcionarios">
    <div class="section-title">👷 Funcionários</div>
    <div id="func-list"></div>
  </div>

  <!-- GASTOS -->
  <div class="page" id="page-gastos">
    <div class="section-title">💸 Gastos</div>
    <div id="gastos-list"></div>
  </div>

  <!-- CARDÁPIO -->
  <div class="page" id="page-cardapio">
    <div class="section-title">🥩 Gerenciar Cardápio</div>
    <div id="card-manage-list"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// Estado
let state = {
  pedidos: [],
  cardapio: [
    { id: 1, nome: 'Churrasco Misto', preco: 20, emoji: '🍖' },
    { id: 2, nome: 'Carne e Calabresa', preco: 20, emoji: '🥩' },
    { id: 3, nome: 'Carne e Frango', preco: 20, emoji: '🍗' },
    { id: 4, nome: 'Bisteca', preco: 23, emoji: '🔥' },
    { id: 5, nome: 'Suco', preco: 6, emoji: '🧃' },
    { id: 6, nome: 'Refrigerante Lata', preco: 6, emoji: '🥤' },
  ],
  carrinho: {},
  nextId: 1
};

// Tabs
function goTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('page-' + tab).classList.add('active');
  if (tab === 'pedidos') renderCardapio();
  if (tab === 'historico') renderHistorico();
  if (tab === 'dashboard') renderDash();
  if (tab === 'funcionarios') renderFuncionarios();
  if (tab === 'gastos') renderGastos();
  if (tab === 'cardapio') renderCardManage();
}

// Data
function setDate() {
  const d = new Date();
  document.getElementById('header-date').textContent = d.toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: '2-digit' }).toUpperCase();
}
setDate();

// Cardápio
function renderCardapio() {
  const grid = document.getElementById('cardapio-grid');
  grid.innerHTML = '';
  state.cardapio.forEach(function(item) {
    const qty = state.carrinho[item.id] || 0;
    const div = document.createElement('div');
    div.className = 'menu-item' + (qty > 0 ? ' selected' : '');
    div.onclick = function() { addCarrinho(item.id); };
    div.innerHTML = `
      ${qty > 0 ? '<div class="qty-badge">' + qty + '</div>' : ''}
      <span class="emoji">${item.emoji}</span>
      <div class="item-name">${item.nome}</div>
      <div class="item-price">R$ ${item.preco.toFixed(2).replace('.',',')}</div>
    `;
    grid.appendChild(div);
  });
  renderCarrinho();
}

function addCarrinho(id) {
  state.carrinho[id] = (state.carrinho[id] || 0) + 1;
  renderCardapio();
}

function removeCarrinho(id) {
  if (state.carrinho[id] > 0) state.carrinho[id]--;
  if (state.carrinho[id] === 0) delete state.carrinho[id];
  renderCardapio();
}

function renderCarrinho() {
  const box = document.getElementById('carrinho-box');
  const list = document.getElementById('carrinho-list');
  const totalEl = document.getElementById('total-val');
  const ids = Object.keys(state.carrinho);

  if (ids.length === 0) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  list.innerHTML = '';
  let total = 0;
  ids.forEach(function(id) {
    const item = state.cardapio.find(function(c) { return c.id == id });
    if (!item) return;
    const qty = state.carrinho[id];
    const sub = item.preco * qty;
    total += sub;
    const row = document.createElement('div');
    row.className = 'pedido-row';
    row.innerHTML = `
      <div class="row-name">${item.emoji} ${item.nome}</div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="removeCarrinho(${id})">−</button>
        <span style="font-weight:800;min-width:18px;text-align:center">${qty}</span>
        <button class="qty-btn" onclick="addCarrinho(${id})">+</button>
      </div>
      <div class="row-price">R$ ${sub.toFixed(2).replace('.',',')}</div>
    `;
    list.appendChild(row);
  });
  totalEl.textContent = 'R$ ' + total.toFixed(2).replace('.', ',');
}

function limparCarrinho() {
  state.carrinho = {};
  renderCardapio();
}

// Pedido
function confirmarPedido() {
  const cliente = document.getElementById('ped-cliente').value.trim() || 'Cliente';
  const ids = Object.keys(state.carrinho);
  if (ids.length === 0) { toast('Adicione itens ao carrinho!', true); return; }

  const itens = ids.map(function(id) {
    const item = state.cardapio.find(function(c) { return c.id == id });
    return { nome: item.nome, emoji: item.emoji, qty: state.carrinho[id], preco: item.preco };
  });

  const pedido = {
    id: state.nextId++,
    cliente: cliente,
    itens: itens,
    total: itens.reduce(function(a, i) { return a + i.preco * i.qty }, 0),
    data: new Date().toLocaleString('pt-BR')
  };

  state.pedidos.push(pedido);
  state.carrinho = {};
  document.getElementById('ped-cliente').value = '';
  document.getElementById('ped-fone').value = '';
  document.getElementById('ped-end').value = '';
  document.getElementById('ped-taxa').value = '2';
  document.getElementById('ped-obs').value = '';

  toast('Pedido #' + pedido.id + ' confirmado! 🔥');
  renderCardapio();
}

// Histórico
function renderHistorico() {
  const list = document.getElementById('hist-list');
  const empty = document.getElementById('hist-empty');
  list.innerHTML = '';

  if (state.pedidos.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  state.pedidos.slice().reverse().forEach(function(p) {
    const card = document.createElement('div');
    card.className = 'hist-card';
    const itensList = p.itens.map(function(i) {
      return i.emoji + ' ' + i.nome + ' x' + i.qty;
    }).join(', ');

    card.innerHTML = `
      <div class="hist-card-top">
        <div>
          <div class="hist-cliente-nome">${p.cliente}</div>
        </div>
        <div class="hist-total">R$ ${p.total.toFixed(2).replace('.',',')}</div>
      </div>
      <div class="hist-itens">${itensList}</div>
      <div class="hist-meta">
        <div class="hist-data">🕐 ${p.data}</div>
      </div>
    `;
    list.appendChild(card);
  });
}

// Dashboard
function renderDash() {
  const receita = state.pedidos.reduce(function(a, p) { return a + p.total }, 0);
  const qtd = state.pedidos.length;

  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">Receita</div><div class="kpi-val" style="color:var(--green)">R$ ${receita.toFixed(0)}</div></div>
    <div class="kpi-card"><div class="kpi-label">Pedidos</div><div class="kpi-val">${qtd}</div></div>
  `;
}

// Funcionários
function renderFuncionarios() {
  document.getElementById('func-list').innerHTML = '<div class="empty"><div class="empty-icon">👷</div>Nenhum funcionário ainda.</div>';
}

// Gastos
function renderGastos() {
  document.getElementById('gastos-list').innerHTML = '<div class="empty"><div class="empty-icon">💰</div>Nenhum gasto registrado.</div>';
}

// Cardápio Manage
function renderCardManage() {
  const el = document.getElementById('card-manage-list');
  el.innerHTML = state.cardapio.map(function(c) {
    return `
      <div class="hist-card">
        <div style="font-weight:700">${c.emoji} ${c.nome} - R$ ${c.preco.toFixed(2).replace('.',',')}</div>
      </div>
    `;
  }).join('');
}

// Toast
function toast(msg, err) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (err ? ' error' : '');
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2800);
}

// Init
renderCardapio();
</script>
</body>
</html>
